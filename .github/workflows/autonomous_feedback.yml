name: Autonomous Feedback Loop

on:
  schedule:
    - cron: '0 * * * *' # Run every hour
  workflow_dispatch: # Allow manual trigger

jobs:
  poll-and-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push code changes
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Aider needs full git history
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements_feedback.txt
          
      - name: Run Feedback Poller
        env:
          # User must define this secret in their GitHub repository settings
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # If using Gemini, define GEMINI_API_KEY and uncomment:
          # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # AIDER_MODEL: gemini/gemini-1.5-pro-latest
        run: |
          # Ensure git identity is set up for aider to commit
          git config --global user.name "SQGATE Automation Bot"
          git config --global user.email "bot@sqgate.online"
          
          python backend/poll_feedback.py
          
      - name: Commit and Push state file (if changed)
        run: |
          git add backend/processed_feedback.json
          # Check if there are changes before committing
          git diff --staged --quiet || (git commit -m "[AUTOMATION] Update processed feedback state" && git push)
