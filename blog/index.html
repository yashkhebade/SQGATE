<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQGATE Updates & Blog</title>
  <meta name="description" content="Latest features, updates, and tutorials for the SQGATE digital logic simulator.">
  <link rel="icon" type="image/webp" href="/icon.webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/liquid-glass.css">
  <style>
    /* Custom Blog Styles */
    :root{
      /* SQGATE - Deep Space Blue Palette (Liquid Glass) */
      --bg0:#060813;--bg1:rgba(12, 15, 28, 0.65);--bg2:rgba(18, 22, 38, 0.65);--bg3:rgba(26, 32, 53, 0.65);--bg4:rgba(34, 42, 69, 0.7);--bgh:rgba(31, 38, 62, 0.8);
      --b1:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.12);--b3:rgba(255,255,255,0.16);
      --t1:#ffffff;--t2:#94a3b8;--t3:#64748b;
      --acc:#8b5cf6;--acr:#ef4444;--aca:#f59e0b;--acb:#10b981;
      --acc-glow:rgba(139,92,246,.25);--acb-glow:rgba(16,185,129,.15);
      --fmono:'Fira Code', ui-monospace, SFMono-Regular, Menlo, monospace;
      --fsans:'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      background: var(--bg0);
      color: var(--t2);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    /* Top Nav */
    .nav {
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(12, 15, 28, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--b1);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: var(--t1);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: 1px;
    }
    .nav-links a {
      color: var(--t2);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: color 0.2s;
      margin-left: 24px;
    }
    .nav-links a:hover { color: var(--t1); }
    
    /* Hero Section */
    .hero {
      text-align: center;
      padding: 80px 20px 60px 20px;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }
    .hero h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 56px;
      font-weight: 800;
      color: var(--t1);
      margin: 0 0 16px 0;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      font-size: 18px;
      color: var(--t3);
      max-width: 600px;
      margin: 0 auto 40px auto;
      line-height: 1.6;
    }

    /* Search Bar */
    .search-container {
      max-width: 500px;
      margin: 0 auto;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 16px 24px 16px 48px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--b2);
      color: var(--t1);
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
      box-sizing: border-box;
    }
    .search-input:focus {
      border-color: var(--acc);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15), 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--t3);
      width: 20px;
      height: 20px;
      pointer-events: none;
    }

    /* Blog Grid */
    .main-content {
      max-width: 1200px;
      margin: 0 auto 100px auto;
      padding: 0 24px;
    }
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 32px;
    }
    
    /* Blog Card */
    .blog-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--b1);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .blog-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.03), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .blog-card:hover {
      transform: translateY(-6px);
      border-color: var(--b2);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(99, 102, 241, 0.1) inset;
    }
    .blog-card:hover::before { opacity: 1; }

    .blog-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .blog-tag {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .tag-new { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(52, 211, 153, 0.3); }
    .tag-update { background: rgba(99, 102, 241, 0.15); color: #818cf8; border: 1px solid rgba(129, 140, 248, 0.3); }
    .tag-tutorial { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3); }

    .blog-date {
      font-size: 12px;
      color: var(--t3);
      font-family: var(--fmono);
    }
    .blog-title {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--t1);
      margin: 0;
      line-height: 1.3;
      transition: color 0.2s;
    }
    .blog-card:hover .blog-title { color: #fff; }
    .blog-desc {
      font-size: 15px;
      line-height: 1.6;
      color: var(--t2);
      margin: 0;
      flex-grow: 1;
    }
    
    .read-more {
      font-size: 14px;
      font-weight: 600;
      color: var(--acc);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      opacity: 0.8;
      transition: all 0.2s;
    }
    .blog-card:hover .read-more {
      opacity: 1;
      gap: 10px;
    }
    
    /* No Results */
    #no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--t3);
      font-size: 18px;
      grid-column: 1 / -1;
      display: none;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .hero h1 { font-size: 40px; }
      .nav { padding: 16px 20px; }
      .main-content { padding: 0 16px; }
      .blog-grid { gap: 20px; grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <a href="/" class="logo">
      <img src="/icon.webp" alt="SQGATE Logo" width="28" height="28" style="border-radius: 6px;">
      SQGATE
    </a>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/pricing.html">Pricing</a>
      <a href="/blog" style="color: var(--t1);">Blog</a>
    </div>
  </nav>

  <!-- Hero -->
  <header class="hero">
    <h1>Latest Updates</h1>
    <p>Discover new features, product updates, and tutorials to help you master digital logic design with SQGATE.</p>
    
    <div class="search-container">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" id="blog-search" class="search-input" placeholder="Search articles, tags, or topics...">
    </div>
  </header>

  <!-- Blog Grid -->
  <main class="main-content">
    <div class="blog-grid" id="blog-grid">
      <!-- Injected by JS -->
    </div>
    <div id="no-results">
      <div style="font-size: 32px; margin-bottom: 12px;">🔍</div>
      No posts found matching your search.
    </div>
  </main>

  <script>
    const BLOG_POSTS = [
      { 
        title: "Getting Started with SQGATE: The Ultimate Logic Simulator", 
        date: "June 29, 2026", 
        desc: "Learn how to build, simulate, and export digital logic circuits right in your browser using SQGATE's powerful visualization engine.", 
        tag: "Tutorial",
        class: "tag-tutorial",
        url: "/blog/posts/getting-started-sqgate.html"
      }
    ];

    const grid = document.getElementById('blog-grid');
    const searchInput = document.getElementById('blog-search');
    const noResults = document.getElementById('no-results');

    function renderBlogs(query) {
      grid.innerHTML = '';
      const q = query.toLowerCase();
      
      const filtered = BLOG_POSTS.filter(b => 
        b.title.toLowerCase().includes(q) || 
        b.desc.toLowerCase().includes(q) || 
        b.tag.toLowerCase().includes(q)
      );
      
      if (filtered.length === 0) {
        noResults.style.display = 'block';
      } else {
        noResults.style.display = 'none';
        
        filtered.forEach(b => {
          const card = document.createElement('div');
          card.className = 'blog-card';
          card.innerHTML = `
            <div class="blog-header">
              <span class="blog-tag ${b.class}">${b.tag}</span>
              <span class="blog-date">${b.date}</span>
            </div>
            <h2 class="blog-title">${b.title}</h2>
            <p class="blog-desc">${b.desc}</p>
            <div class="read-more">
              Read Article <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </div>
          `;
          
          card.addEventListener('click', () => {
            card.style.transform = 'scale(0.98)';
            setTimeout(() => {
              card.style.transform = '';
              if(b.url) window.location.href = b.url;
            }, 150);
          });
          
          grid.appendChild(card);
        });
      }
    }

    // Initial render
    renderBlogs('');

    // Search event
    searchInput.addEventListener('input', (e) => {
      renderBlogs(e.target.value);
    });
  </script>
</body>
</html>
