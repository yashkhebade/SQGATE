  :root {
    /* SQGATE Deep Space Blue Palette (Liquid Glass) */
    --bg0: #060813;
    --bg1: rgba(12, 15, 28, 0.65);
    --bg2: rgba(18, 22, 38, 0.65);
    --bg3: rgba(26, 32, 53, 0.65);
    --b1: rgba(255, 255, 255, 0.08);
    --b2: rgba(255, 255, 255, 0.12);
    --t1: #ffffff;
    --t2: #94a3b8;
    --t3: #64748b;
    --fmain: 'Outfit', sans-serif;
    --fmono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg0);
    color: var(--t1);
    font-family: var(--fmain);
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.4); }

  /* Header */
  #kmap-header {
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: 60px;
    background: rgba(18,22,38,0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--b1);
    flex-shrink: 0;
  }
  .site-brand {
    display: flex;
    align-items: center;
    text-decoration: none;
    font-weight: 700;
    font-size: 16px;
    color: var(--t1);
    letter-spacing: 0.5px;
  }
  .site-brand img { width: 24px; height: 24px; margin-right: 10px; }
  .logo-pill {
    background: rgba(239, 68, 68, 0.15);
    color: #ef4444;
    border: 1px solid rgba(239, 68, 68, 0.3);
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    margin-left: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .header-sep { flex: 1; }

  /* App Container */
  .kmap-root {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    box-sizing: border-box;
  }

  /* Controls */
  .controls {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 24px; flex-wrap: wrap;
    background: var(--bg1);
    padding: 12px 20px;
    border-radius: 12px;
    border: 1px solid var(--b1);
  }
  .ctrl-label { font-size: 13px; color: var(--t3); font-weight: 600; margin-right: 8px; }
  .var-btn {
    background: var(--bg2);
    border: 1px solid var(--b2);
    color: var(--t2);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }
  .var-btn:hover { border-color: #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.05); }
  .var-btn.active {
    background: rgba(239, 68, 68, 0.1);
    border-color: #ef4444;
    color: #ef4444;
  }
  .reset-btn {
    background: transparent;
    border: 1px solid var(--b2);
    color: var(--t2);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    margin-left: auto;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .reset-btn:hover { border-color: var(--t1); color: var(--t1); }

  /* Main layout */
  .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 24px; align-items: start; }
  @media(max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } }

  /* Cards */
  .kmap-card {
    background: var(--bg1);
    border: 1px solid var(--b2);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .kmap-section-label {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--t3); margin-bottom: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px;
  }

  .kmap-wrapper { 
    position: relative; 
    display: inline-block; 
    margin-bottom: 24px;
  }
  
  .kmap-table { border-collapse: collapse; position: relative; z-index: 2; }
  .kmap-table th {
    background: var(--bg2);
    color: var(--t2);
    font-size: 13px;
    padding: 10px 16px;
    text-align: center;
    border: 1px solid var(--b1);
    font-weight: 600;
    min-width: 64px;
  }
  .kmap-table th.corner { background: var(--bg0); border-color: transparent; position: relative; }
  .kmap-table th.row-header { color: var(--t2); }

  .kmap-cell {
    width: 64px; height: 64px;
    text-align: center;
    border: 1px solid var(--b1);
    cursor: pointer;
    font-size: 20px;
    font-weight: 700;
    transition: all 0.15s;
    position: relative;
    user-select: none;
    font-family: 'JetBrains Mono', monospace;

  .kmap-cell:hover { background: rgba(255,255,255,0.05); }
  .kmap-cell.val-0 { color: var(--t3); }
  .kmap-cell.val-1 { color: #4ade80; }
  .kmap-cell.val-x { color: #60a5fa; }

  /* Responsive Cell Sizes for 5 and 6 Variables */
  .kmap-table.vars-5 th, .kmap-table.vars-6 th { min-width: 46px; padding: 6px 8px; font-size: 11px; }
  .kmap-table.vars-5 .kmap-cell, .kmap-table.vars-6 .kmap-cell { width: 46px; height: 46px; font-size: 16px; }

  /* Minterm label */
  .minterm-num {
    position: absolute; top: 4px; left: 6px;
    font-size: 10px; color: var(--t3); font-weight: 500;
    font-family: sans-serif;
  }

  /* SVG Overlay */
  #kmap-svg-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 3;
  }

  /* Legend */
  .legend {
    display: flex; gap: 20px; flex-wrap: wrap;
    background: var(--bg2); padding: 12px 16px; border-radius: 8px; border: 1px solid var(--b1);
  }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--t2); font-weight: 500; }
  .legend-dot { width: 12px; height: 12px; border-radius: 4px; }

  /* Result card */
  .result-card {
    background: var(--bg1);
    border: 1px solid var(--b2);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }

  .sop-display {
    background: var(--bg2);
    border: 1px solid var(--b1);
    border-radius: 12px;
    padding: 16px;
    font-size: 18px;
    color: var(--t1);
    font-family: 'JetBrains Mono', monospace;
    min-height: 64px;
    line-height: 1.6;
    word-break: break-all;
    display: flex; align-items: center;
  }
  .sop-display .term { color: #fb923c; }
  .sop-display .plus { color: var(--t3); padding: 0 6px; }
  .sop-display .one { color: #4ade80; }
  .sop-display .zero { color: var(--t3); }
  .sop-display .bar { text-decoration: overline; }
  .sop-display.empty { color: var(--t3); font-size: 14px; font-family: var(--fmain); }

  /* Implicants list */
  .impl-list { display: flex; flex-direction: column; gap: 8px; }
  .impl-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg2);
    border: 1px solid var(--b1);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.2s;
    cursor: default;
  }
  .impl-item:hover { background: rgba(255,255,255,0.05); }
  .impl-dot { width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0; }
  .impl-term { color: var(--t1); font-weight: 600; }
  .impl-minterms { color: var(--t3); font-size: 12px; margin-left: auto; font-family: var(--fmain); }

  /* Minterms input */
  .minterm-tag-box {
    background: var(--bg2);
    border: 1px solid var(--b1);
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    color: var(--t2);
    font-family: 'JetBrains Mono', monospace;
    min-height: 44px;
  }

  .verilog-btn {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #ef4444;
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s;
    width: 100%;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .verilog-btn:hover { background: rgba(239, 68, 68, 0.15); border-color: #ef4444; }

  .copied-toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg1); border: 1px solid #4ade80;
    color: #4ade80; padding: 12px 20px; border-radius: 12px;
    font-size: 14px; font-weight: 600;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none; z-index: 10000;
  }
  .copied-toast.show { opacity: 1; }

  @keyframes guidePulse {
    0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
    100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
  }
  .guide-pulse { animation: guidePulse 2s infinite; }

/* ── MOBILE UI REDESIGN ── */
@media (max-width: 768px) {
  .vbtn, .rstbtn {

  }

}
</style>

*{box-sizing:border-box;margin:0;padding:0}
.km-root{font-family:var(--font-mono,'JetBrains Mono',monospace);padding:24px; flex:1; overflow-y:auto; max-width:1200px; margin:0 auto; width:100%}
.km-topbar{display:flex;align-items:center;gap:12px;padding:1rem 0 1.25rem;flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:1.25rem;display:none} /* Hidden topbar, using header instead */
.km-icon{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;width:34px;height:34px;padding:5px;background:var(--bg-warning);border-radius:8px;flex-shrink:0}
.km-icon span{background:var(--text-warning);border-radius:1px}
.km-title{font-size:15px;font-weight:500;color:var(--text-primary);letter-spacing:-.3px}
.km-sub{font-size:12px;color:var(--text-muted);margin-top:1px;font-family:var(--font-sans)}
.km-ctrl-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:16px 20px; background:var(--surface-1); border:1px solid var(--border); border-radius:12px; margin-bottom:1.5rem}
.km-lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;font-family:var(--font-sans)}

.vbtn:hover{border-color:var(--border-accent);color:var(--text-accent);background:var(--bg-accent)}
.vbtn.on{background:var(--bg-accent);border-color:var(--border-accent);color:var(--text-accent);font-weight:600}
.rstbtn{background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:var(--radius);padding:8px 16px;font-size:12px;cursor:pointer;font-family:var(--font-sans);margin-left:auto;transition:all .12s}
.rstbtn:hover{border-color:var(--border-danger);color:var(--text-danger);background:rgba(239,68,68,0.1)}

.km-body{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start}
@media(max-width:1100px){.km-body{grid-template-columns:1fr}}

.km-maps-col{display:flex;flex-direction:row;flex-wrap:wrap;gap:24px}

.km-plane-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--text-muted);margin-bottom:16px;font-family:var(--font-sans)}
.km-plane-lbl span{color:var(--text-accent);font-weight:600}

.kmtbl{border-collapse:collapse;margin:0 auto}
.kmtbl th{background:var(--surface-0);color:var(--text-muted);font-size:12px;padding:8px 12px;text-align:center;border:1px solid var(--border);font-weight:500;min-width:48px;font-family:var(--font-mono)}
.kmtbl th.corner{background:transparent;border-color:transparent;color:var(--text-muted);font-size:11px}
.kmtbl th.rhdr{color:var(--text-secondary)}
.km-cell{width:48px;height:48px;text-align:center;border:1px solid var(--border);cursor:pointer;font-size:16px;font-weight:600;transition:all .1s;position:relative;user-select:none;vertical-align:middle;font-family:var(--font-mono)}
.km-cell:hover{border-color:var(--border-accent)!important;background:rgba(255,255,255,0.05)}
.km-cell.v0{background:transparent;color:var(--text-muted)}
.km-cell.v1{background:var(--bg-warning);color:var(--text-warning);box-shadow:inset 0 0 12px rgba(245,158,11,0.1)}
.km-cell.vx{background:var(--bg-pro);color:var(--text-pro)}
.km-cell.hi{outline:2px solid var(--border-accent);outline-offset:-2px}
.mnum{position:absolute;top:4px;left:6px;font-size:9px;color:var(--text-muted);font-weight:400;pointer-events:none}

.km-legend{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);font-family:var(--font-sans)}
.leg-dot{width:12px;height:12px;border-radius:4px;flex-shrink:0}

.km-panel{display:flex;flex-direction:column;gap:16px;position:sticky;top:16px}
.panel-card{background:var(--surface-1);border:1px solid var(--border);border-radius:12px;padding:20px}
.pc-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:12px;font-family:var(--font-sans);font-weight:600}

.sop-box{background:var(--surface-0);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;font-size:15px;color:var(--text-primary);min-height:56px;line-height:1.7;word-break:break-all;font-family:var(--font-mono)}
.sop-box.empty-state{color:var(--text-muted);font-size:14px;font-style:italic}
.sop-t{color:var(--text-warning)}
.sop-p{color:var(--text-muted);padding:0 4px}
.sop-bar{text-decoration:overline}
.sop-one{color:var(--text-success)}

.impl-list{display:flex;flex-direction:column;gap:8px;max-height:250px;overflow-y:auto;padding-right:4px}
.impl-item{display:flex;align-items:center;gap:8px;background:var(--surface-0);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:13px}
.impl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.impl-tm{color:var(--text-primary);font-family:var(--font-mono)}
.impl-ms{color:var(--text-muted);margin-left:auto;font-size:11px;font-family:var(--font-sans);max-width:140px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.mt-box{background:var(--surface-0);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--text-muted);font-family:var(--font-sans);min-height:42px}

.vbtn2{background:var(--bg-warning);border:1px solid var(--border-warning);color:var(--text-warning);border-radius:var(--radius);padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-mono);transition:all .2s;width:100%;letter-spacing:.05em;display:flex;align-items:center;justify-content:center;gap:8px}
.vbtn2:hover{background:var(--fill-warning);color:var(--on-warning);transform:translateY(-2px);box-shadow:0 4px 12px rgba(245,158,11,0.2)}

.tip-box{font-size:12px;color:var(--text-muted);font-family:var(--font-sans);line-height:1.6;padding:14px;background:var(--surface-0);border-radius:var(--radius);border:1px solid var(--border)}
.tip-box b{color:var(--text-secondary);font-weight:600}

.toast{position:fixed;bottom:24px;right:24px;background:var(--surface-2);border:1px solid var(--border-strong);color:var(--text-primary);padding:12px 20px;border-radius:var(--radius);font-size:14px;font-family:var(--font-sans);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;box-shadow:0 10px 30px rgba(0,0,0,0.5);font-weight:500}
.toast.show{opacity:1}
/* LIQUID GLASS EFFECTS */
#kmap-header, .km-ctrl-row, .panel-card, .vbtn, .vbtn2, .ov-box, .sqgate-em-box {
  backdrop-filter: blur(16px) saturate(120%);
  -webkit-backdrop-filter: blur(16px) saturate(120%);
}
.panel-card, .ov-box, .sqgate-em-box { box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }

/* BACKGROUND ORBS */
.bg-orbs { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; background: #060813; }
.orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; animation: float 20s infinite ease-in-out alternate; }
.orb-1 { width: 400px; height: 400px; background: #8b5cf6; top: -100px; left: -100px; }
.orb-2 { width: 500px; height: 500px; background: #10b981; bottom: -150px; right: -100px; animation-delay: -5s; }
.orb-3 { width: 300px; height: 300px; background: #22d3ee; top: 40%; left: 30%; animation-delay: -10s; opacity: 0.3; }
@keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

.ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999999; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.ov-box { width: 440px; text-align: center; border: 1px solid var(--border-accent); background: var(--surface-1); box-shadow: 0 0 40px rgba(99,102,241,0.2); border-radius: 12px; padding: 30px; font-family: var(--font-sans); }
.ov-btn { padding: 12px; font-size: 15px; font-weight: 700; border-radius: 8px; cursor: pointer; display: block; width: 100%; border: none; font-family: var(--font-sans); color: var(--text-primary); }
.ov-btn.primary { background: var(--bg-accent); text-decoration: none; margin-bottom: 12px; color: var(--text-accent); }
</style>
<div class="ov" id="pro-modal">
  <div class="ov-box">
    <div style="font-size: 24px; font-weight: 800; color: white; margin-bottom: 8px;">Pro Feature Locked</div>
    <div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 24px;">
      You've reached a free tier limit: <strong style="color:var(--text-primary);" id="pro-feature-name">Unlimited Components</strong>. Upgrade to Pro to remove all limits.
    </div>
    
    <a href="/pricing.html" class="ov-btn primary">See Pro Pricing</a>
    
    <button class="ov-btn" style="background: transparent; border: 1px solid var(--border-strong);" onclick="document.getElementById('pro-modal').style.display='none'">Cancel</button>
  </div>
</div>
<script>
function checkProStatus() {
  return localStorage.getItem('sqgate_pro_status') === 'active';
}
function showProModal(featureName) {
  const m = document.getElementById('pro-modal');
  if(m) {
    document.getElementById('pro-feature-name').textContent = featureName;
    m.style.display = 'flex';
  }
}
</script>

<style>

  /* GLOBAL LIQUID GLASS EFFECTS - DISTORTION */

    position: relative;
    z-index: 2;
  }
  .panel-card::before, .vbtn::before, .vbtn2::before, .ov-box::before, .sqgate-em-box::before, .tb-btn::before, .step-btn::before, .puzzle-card::before, .pz-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: rgba(255,255,255,0.02);
    filter: url("#radio-glass");
    z-index: -1;
    pointer-events: none;
    opacity: 0.8; 
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .panel-card:hover::before, .vbtn:hover::before, .vbtn2:hover::before, .tb-btn:hover::before, .step-btn:hover::before, .puzzle-card:hover::before, .pz-btn:hover::before {
    opacity: 1;
    background: rgba(255,255,255,0.06);
  }

<div id="sqgate-error-modal">
  <div class="sqgate-em-box">
    <div class="sqgate-em-icon">⚠️</div>

    <div class="sqgate-em-msg">The application encountered an unexpected issue. You can report this to help us fix it!</div>
    <div class="sqgate-em-actions">
      <button class="sqgate-em-btn sqgate-em-btn-secondary" onclick="document.getElementById('sqgate-error-modal').classList.remove('show')">Dismiss</button>
      <a class="sqgate-em-btn sqgate-em-btn-primary" href="https://docs.google.com/forms/d/e/1FAIpQLSc5AzzP2NccDkCbKAb5mVvefYFc5_X-EkJZx5RLWO7aqQ_8cw/viewform" target="_blank">Report Problem</a>
    </div>
  </div>

<script>
function showGlobalError(msg) {
  var m = document.getElementById('sqgate-error-modal');
  if(m && !m.classList.contains('show')) m.classList.add('show');
}
window.addEventListener('error', function(e) { showGlobalError(e.message); });
window.addEventListener('unhandledrejection', function(e) { showGlobalError(e.reason); });
</script>
