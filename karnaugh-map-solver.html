<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Interactive K-Map Solver - SQGATE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.36.0/tabler-icons.min.css">
<link rel="stylesheet" href="index.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    /* SQGATE Deep Space Blue Palette */
    --bg0: #060813;
    --bg1: #0c0f1c;
    --bg2: #121626;
    --bg3: #1a2035;
    --b1: #1e243b;
    --b2: #2b3453;
    --t1: #ffffff;
    --t2: #94a3b8;
    --t3: #64748b;
    --fmain: 'Outfit', sans-serif;
    --fmono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg0);
    color: var(--t1);
    font-family: var(--fmain);
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* Header */
  #kmap-header {
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: 60px;
    background: rgba(18,22,38,0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--b1);
    flex-shrink: 0;
  }
  .site-brand {
    display: flex;
    align-items: center;
    text-decoration: none;
    font-weight: 700;
    font-size: 16px;
    color: var(--t1);
    letter-spacing: 0.5px;
  }
  .site-brand img { width: 24px; height: 24px; margin-right: 10px; }
  .logo-pill {
    background: rgba(239, 68, 68, 0.15);
    color: #ef4444;
    border: 1px solid rgba(239, 68, 68, 0.3);
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    margin-left: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .header-sep { flex: 1; }

  /* App Container */
  .kmap-root {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    box-sizing: border-box;
  }

  /* Controls */
  .controls {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 24px; flex-wrap: wrap;
    background: var(--bg1);
    padding: 12px 20px;
    border-radius: 12px;
    border: 1px solid var(--b1);
  }
  .ctrl-label { font-size: 13px; color: var(--t3); font-weight: 600; margin-right: 8px; }
  .var-btn {
    background: var(--bg2);
    border: 1px solid var(--b2);
    color: var(--t2);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }
  .var-btn:hover { border-color: #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.05); }
  .var-btn.active {
    background: rgba(239, 68, 68, 0.1);
    border-color: #ef4444;
    color: #ef4444;
  }
  .reset-btn {
    background: transparent;
    border: 1px solid var(--b2);
    color: var(--t2);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    margin-left: auto;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .reset-btn:hover { border-color: var(--t1); color: var(--t1); }

  /* Main layout */
  .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 24px; align-items: start; }
  @media(max-width: 800px) { .main-grid { grid-template-columns: 1fr; } }

  /* Cards */
  .kmap-card {
    background: var(--bg1);
    border: 1px solid var(--b2);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .kmap-section-label {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--t3); margin-bottom: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px;
  }

  .kmap-wrapper { 
    position: relative; 
    display: inline-block; 
    margin-bottom: 24px;
  }
  
  .kmap-table { border-collapse: collapse; position: relative; z-index: 2; }
  .kmap-table th {
    background: var(--bg2);
    color: var(--t2);
    font-size: 13px;
    padding: 10px 16px;
    text-align: center;
    border: 1px solid var(--b1);
    font-weight: 600;
    min-width: 64px;
  }
  .kmap-table th.corner { background: var(--bg0); border-color: transparent; position: relative; }
  .kmap-table th.row-header { color: var(--t2); }

  .kmap-cell {
    width: 64px; height: 64px;
    text-align: center;
    border: 1px solid var(--b1);
    cursor: pointer;
    font-size: 20px;
    font-weight: 700;
    transition: all 0.15s;
    position: relative;
    user-select: none;
    font-family: 'JetBrains Mono', monospace;
  }
  .kmap-cell:hover { background: rgba(255,255,255,0.05); }
  .kmap-cell.val-0 { color: var(--t3); }
  .kmap-cell.val-1 { color: #4ade80; }
  .kmap-cell.val-x { color: #60a5fa; }

  /* Minterm label */
  .minterm-num {
    position: absolute; top: 4px; left: 6px;
    font-size: 10px; color: var(--t3); font-weight: 500;
    font-family: sans-serif;
  }

  /* SVG Overlay */
  #kmap-svg-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 3;
  }

  /* Legend */
  .legend {
    display: flex; gap: 20px; flex-wrap: wrap;
    background: var(--bg2); padding: 12px 16px; border-radius: 8px; border: 1px solid var(--b1);
  }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--t2); font-weight: 500; }
  .legend-dot { width: 12px; height: 12px; border-radius: 4px; }

  /* Result card */
  .result-card {
    background: var(--bg1);
    border: 1px solid var(--b2);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }

  .sop-display {
    background: var(--bg2);
    border: 1px solid var(--b1);
    border-radius: 12px;
    padding: 16px;
    font-size: 18px;
    color: var(--t1);
    font-family: 'JetBrains Mono', monospace;
    min-height: 64px;
    line-height: 1.6;
    word-break: break-all;
    display: flex; align-items: center;
  }
  .sop-display .term { color: #fb923c; }
  .sop-display .plus { color: var(--t3); padding: 0 6px; }
  .sop-display .one { color: #4ade80; }
  .sop-display .zero { color: var(--t3); }
  .sop-display .bar { text-decoration: overline; }
  .sop-display.empty { color: var(--t3); font-size: 14px; font-family: var(--fmain); }

  /* Implicants list */
  .impl-list { display: flex; flex-direction: column; gap: 8px; }
  .impl-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg2);
    border: 1px solid var(--b1);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.2s;
    cursor: default;
  }
  .impl-item:hover { background: rgba(255,255,255,0.05); }
  .impl-dot { width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0; }
  .impl-term { color: var(--t1); font-weight: 600; }
  .impl-minterms { color: var(--t3); font-size: 12px; margin-left: auto; font-family: var(--fmain); }

  /* Minterms input */
  .minterm-tag-box {
    background: var(--bg2);
    border: 1px solid var(--b1);
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    color: var(--t2);
    font-family: 'JetBrains Mono', monospace;
    min-height: 44px;
  }

  .verilog-btn {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #ef4444;
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s;
    width: 100%;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .verilog-btn:hover { background: rgba(239, 68, 68, 0.15); border-color: #ef4444; }

  .copied-toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg1); border: 1px solid #4ade80;
    color: #4ade80; padding: 12px 20px; border-radius: 12px;
    font-size: 14px; font-weight: 600;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none; z-index: 10000;
  }
  .copied-toast.show { opacity: 1; }

  @keyframes guidePulse {
    0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
    100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
  }
  .guide-pulse { animation: guidePulse 2s infinite; }
</style>

<body>

<!-- HEADER -->
<div id="kmap-header">
  <a href="index.html" class="site-brand">
    <img src="icon.png" alt="Logo">
    SQGATE
  </a>
  <div class="logo-pill">
    <i class="ti ti-grid-dots" aria-hidden="true"></i>
    K-Map Solver
  </div>
  <div class="header-sep"></div>
  <button class="hdr-btn guide-pulse" id="btn-guide" onclick="startTour()" title="How to use" style="background:transparent; border:1px solid var(--b2); color:var(--t2); padding:6px 12px; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; margin-left:16px;">
    <i class="ti ti-help" aria-hidden="true"></i> Guide
  </button>
</div>

<div class="kmap-root">
  <div class="controls">
    <span class="ctrl-label">VARIABLES</span>
    <button class="var-btn" data-v="2" id="v2-btn">2 — AB</button>
    <button class="var-btn active" data-v="3" id="v3-btn">3 — ABC</button>
    <button class="var-btn" data-v="4" id="v4-btn">4 — ABCD</button>
    <button class="reset-btn" id="resetBtn" onclick="initGrid(); renderTable(); solve();">
      <i class="ti ti-refresh"></i> Clear Map
    </button>
  </div>

  <div class="main-grid">
    <div class="kmap-card">
      <div class="kmap-section-label"><i class="ti ti-hand-click"></i> Click cells to toggle 0 → 1 → X</div>
      
      <div class="kmap-wrapper" id="kmap-wrapper">
        <table class="kmap-table" id="kmapTable"></table>
        <svg id="kmap-svg-overlay"></svg>
      </div>

      <div class="legend">

      <div>

        <div class="impl-list" id="implList">
          <div style="color:var(--t3);font-size:13px;">No minterms selected</div>
        </div>

      <div>

  <div id="tour-dialog" style="position:absolute;width:320px;background:var(--bg0);border:1px solid var(--b1);border-radius:8px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,0.5);pointer-events:auto;transition:all 0.3s ease;transform:translateY(10px);opacity:0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">

      </div>

<script>
// ============================================================
// GRAY CODE & GRID CONFIG
// ============================================================
const CONFIGS = {
  2: {
    vars: ['A','B'],
    rowBits: ['0','1'], colBits: ['0','1'],
    rowLabel: 'A', colLabel: 'B', totalVars: 2
  },
  3: {
    vars: ['A','B','C'],
    rowBits: ['0','1'], colBits: ['00','01','11','10'],
    rowLabel: 'A', colLabel: 'BC', totalVars: 3
  },
  4: {
    vars: ['A','B','C','D'],
    rowBits: ['00','01','11','10'], colBits: ['00','01','11','10'],
    rowLabel: 'AB', colLabel: 'CD', totalVars: 4
  }
};

let varCount = 3;
let gridData = {};

function initGrid() {
  const cfg = CONFIGS[varCount];
  gridData = {};
  for(let r=0; r<cfg.rowBits.length; r++)
    for(let c=0; c<cfg.colBits.length; c++)
      gridData[`${r},${c}`] = '0';
}

function cellMinterm(r, c) {
  const cfg = CONFIGS[varCount];
  let bits = cfg.rowBits[r] + cfg.colBits[c];
  return parseInt(bits, 2);
}

// ============================================================
// RENDER K-MAP TABLE
// ============================================================
function renderTable() {
  const cfg = CONFIGS[varCount];
  const table = document.getElementById('kmapTable');
  table.innerHTML = '';

  const thead = document.createElement('thead');
  const hr = document.createElement('tr');
  const corner = document.createElement('th');
  corner.className = 'corner';
  corner.innerHTML = `<span style="color:#ef4444;font-size:11px">${cfg.rowLabel}↓ ${cfg.colLabel}→</span>`;
  hr.appendChild(corner);

  cfg.colBits.forEach(cb => {
    const th = document.createElement('th');
    th.textContent = cb;
    hr.appendChild(th);
  });
  thead.appendChild(hr);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  for(let r=0; r<cfg.rowBits.length; r++) {
    const tr = document.createElement('tr');
    const rh = document.createElement('th');
    rh.className = 'row-header';
    rh.textContent = cfg.rowBits[r];
    tr.appendChild(rh);

    for(let c=0; c<cfg.colBits.length; c++) {
      const td = document.createElement('td');
      const val = gridData[`${r},${c}`] || '0';
      const m = cellMinterm(r, c);
      td.className = `kmap-cell val-${val.toLowerCase()}`;
      td.dataset.r = r;
      td.dataset.c = c;
      td.innerHTML = `<span class="minterm-num">${m}</span>${val}`;
      td.addEventListener('click', () => {
        toggleCell(r, c);
        if(typeof checkTourAction === 'function') checkTourAction('click-cell');
      });
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
}

function toggleCell(r, c) {
  const cur = gridData[`${r},${c}`];
  const next = cur === '0' ? '1' : cur === '1' ? 'X' : '0';
  gridData[`${r},${c}`] = next;
  renderTable();
  solve();
}

// ============================================================
// QUINE-McCLUSKEY SOLVER
// ============================================================
function getBitPattern(m, bits) { return m.toString(2).padStart(bits,'0'); }

function solveKMap(gridData, varCount) {
  const cfg = CONFIGS[varCount];
  const rows = cfg.rowBits.length;
  const cols = cfg.colBits.length;
  const bits = varCount;
  const total = 1 << bits;

  const ones = new Set();
  const dontCares = new Set();
  
  // Also track minterms back to r,c for drawing
  const mToCoords = {};

  for(let r=0;r<rows;r++) {
    for(let c=0;c<cols;c++) {
      const v = gridData[`${r},${c}`] || '0';
      const m = cellMinterm(r,c);
      mToCoords[m] = {r,c};
      if(v==='1') ones.add(m);
      if(v==='X') dontCares.add(m);
    }
  }

  if(ones.size === 0) return { sop: '0', terms: [], ones, dontCares, mToCoords };
  
  const totalOnes = [...ones].length;
  if(totalOnes + [...dontCares].length === total) {
    return { sop: '1', terms: [{ pattern: '-'.repeat(bits), minterms: ones, allMinterms: new Set([...ones, ...dontCares]) }], ones, dontCares, mToCoords };
  }

  const allForSolving = new Set([...ones, ...dontCares]);
  let implicants = [...allForSolving].map(m => ({
    pattern: getBitPattern(m, bits),
    minterms: new Set([m]),
    used: false
  }));

  const primes = [];
  function reducePass(impl) {
    const next = [];
    const used = new Set();
    for(let i=0;i<impl.length;i++) {
      for(let j=i+1;j<impl.length;j++) {
        const a = impl[i], b = impl[j];
        let dashMatch = true;
        let diffs = [];
        for(let k=0;k<bits;k++) {
          if(a.pattern[k]==='-' && b.pattern[k]!=='-') { dashMatch=false; break; }
          if(a.pattern[k]!=='-' && b.pattern[k]==='-') { dashMatch=false; break; }
          if(a.pattern[k]!==b.pattern[k]) diffs.push(k);
        }
        if(!dashMatch || diffs.length!==1) continue;
        const newPat = a.pattern.split('');
        newPat[diffs[0]] = '-';
        const newM = new Set([...a.minterms, ...b.minterms]);
        const patStr = newPat.join('');
        if(!next.find(x=>x.pattern===patStr)) next.push({ pattern: patStr, minterms: newM, used: false });
        used.add(i); used.add(j);
        impl[i].used = true; impl[j].used = true;
      }
    }
    impl.forEach((imp, i) => { if(!imp.used) primes.push(imp); });
    return next;
  }

  let current = implicants;
  for(let pass=0;pass<bits;pass++) {
    const next = reducePass(current);
    if(next.length===0) break;
    current = next;
  }
  current.forEach(imp => { if(!imp.used) primes.push(imp); });

  const primeSet = [];
  const seen = new Set();
  primes.forEach(p => {
    if(!seen.has(p.pattern)) { seen.add(p.pattern); primeSet.push(p); }
  });

  const onesList = [...ones];
  const coverage = {};
  onesList.forEach(m => { coverage[m] = primeSet.filter(p => p.minterms.has(m)); });

  const essential = new Set();
  const essentialPIs = [];
  onesList.forEach(m => {
    if(coverage[m].length === 1) {
      const pi = coverage[m][0];
      if(!essential.has(pi.pattern)) {
        essential.add(pi.pattern);
        essentialPIs.push(pi);
      }
    }
  });

  let covered = new Set();
  essentialPIs.forEach(pi => pi.minterms.forEach(m => { if(ones.has(m)) covered.add(m); }));

  const finalPIs = [...essentialPIs];
  let remaining = onesList.filter(m => !covered.has(m));
  
  while(remaining.length > 0) {
    let best = null, bestCount = 0;
    primeSet.forEach(pi => {
      if(essentialPIs.includes(pi)) return;
      const cnt = remaining.filter(m => pi.minterms.has(m)).length;
      if(cnt > bestCount) { bestCount = cnt; best = pi; }
    });
    if(!best || bestCount === 0) break;
    finalPIs.push(best);
    best.minterms.forEach(m => { if(ones.has(m)) covered.add(m); });
    remaining = onesList.filter(m => !covered.has(m));
  }

  const vars = cfg.vars;
  const terms = finalPIs.map(pi => {
    const term = [];
    for(let i=0;i<bits;i++) {
      if(pi.pattern[i]==='0') term.push({ v: vars[i], comp: true });
      else if(pi.pattern[i]==='1') term.push({ v: vars[i], comp: false });
    }
    return { 
      parts: term, 
      pattern: pi.pattern, 
      minterms: new Set([...pi.minterms].filter(m=>ones.has(m))),
      allMinterms: pi.minterms
    };
  });

  return { terms, ones, dontCares, mToCoords };
}

// ============================================================
// VISUAL GROUPING (SVG)
// ============================================================
const GROUP_COLORS = ['rgba(239,68,68,', 'rgba(59,130,246,', 'rgba(34,197,94,', 'rgba(245,158,11,', 'rgba(168,85,247,', 'rgba(236,72,153,'];

function getSegments(indices) {
  if(!indices || indices.length===0) return [];
  let segments = [];
  let start = indices[0];
  for(let i=1; i<=indices.length; i++) {
    if(i === indices.length || indices[i] !== indices[i-1] + 1) {
      segments.push({ min: start, max: indices[i-1] });
      if(i < indices.length) start = indices[i];
    }
  }
  return segments;
}

function drawGroups(result) {
  const svg = document.getElementById('kmap-svg-overlay');
  svg.innerHTML = '';
  if(!result.terms) return;
  
  const svgRect = svg.getBoundingClientRect();
  const PADDING = 6;
  
  result.terms.forEach((t, i) => {
    const colorRoot = GROUP_COLORS[i % GROUP_COLORS.length];
    
    // Find all r and c for this implicant
    const rs = new Set(), cs = new Set();
    t.allMinterms.forEach(m => {
      const coords = result.mToCoords[m];
      rs.add(coords.r);
      cs.add(coords.c);
    });
    
    const rSegs = getSegments([...rs].sort((a,b)=>a-b));
    const cSegs = getSegments([...cs].sort((a,b)=>a-b));
    
    // Draw cartesian product of segments
    rSegs.forEach(rsg => {
      cSegs.forEach(csg => {
        const cellMin = document.querySelector(`td[data-r="${rsg.min}"][data-c="${csg.min}"]`);
        const cellMax = document.querySelector(`td[data-r="${rsg.max}"][data-c="${csg.max}"]`);
        if(!cellMin || !cellMax) return;
        
        const minR = cellMin.getBoundingClientRect();
        const maxR = cellMax.getBoundingClientRect();
        
        // Calculate offset based on term index to nest overlapping boxes
        const offset = PADDING + (i * 3);
        
        const x = (minR.left - svgRect.left) + offset;
        const y = (minR.top - svgRect.top) + offset;
        const width = (maxR.right - minR.left) - (offset * 2);
        const height = (maxR.bottom - minR.top) - (offset * 2);
        
        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x", x);
        rect.setAttribute("y", y);
        rect.setAttribute("width", width);
        rect.setAttribute("height", height);
        rect.setAttribute("rx", 10);
        rect.setAttribute("ry", 10);
        rect.setAttribute("fill", colorRoot + "0.15)");
        rect.setAttribute("stroke", colorRoot + "0.8)");
        rect.setAttribute("stroke-width", "2");
        rect.setAttribute("class", `group-rect term-${i}`);
        rect.style.transition = "all 0.2s";
        svg.appendChild(rect);
      });
    });
  });
}

// ============================================================
// RENDER RESULTS
// ============================================================
function termToHTML(term) {
  if(term.parts.length === 0) return '<span class="one">1</span>';
  return term.parts.map(p => {
    if(p.comp) return `<span class="term"><span class="bar">${p.v}</span></span>`;
    return `<span class="term">${p.v}</span>`;
  }).join('');
}

function solve() {
  const result = solveKMap(gridData, varCount);
  drawGroups(result);
  
  const sopEl = document.getElementById('sopDisplay');
  const implEl = document.getElementById('implList');
  const mintBox = document.getElementById('mintermBox');

  if(result.sop === '0') {
    sopEl.className = 'sop-display empty';
    sopEl.textContent = 'F = 0  (no minterms)';
  } else if(result.sop === '1') {
    sopEl.className = 'sop-display';
    sopEl.innerHTML = 'F = <span class="one">1</span>';
  } else if(!result.terms || result.terms.length === 0) {
    sopEl.className = 'sop-display empty';
    sopEl.textContent = 'Click cells to begin solving...';
  } else {
    sopEl.className = 'sop-display';
    const termHTML = result.terms.map(t => termToHTML(t)).join('<span class="plus"> + </span>');
    sopEl.innerHTML = `F = ${termHTML}`;
  }

  if(!result.terms || result.terms.length === 0) {
    implEl.innerHTML = '<div style="color:var(--t3);font-size:13px;">No minterms selected</div>';
  } else {
    implEl.innerHTML = result.terms.map((t,i) => {
      const col = GROUP_COLORS[i % GROUP_COLORS.length] + '1)';
      const termStr = t.parts.length===0 ? '1' : t.parts.map(p=>p.comp?`${p.v}'`:p.v).join('');
      const ms = [...t.minterms].sort((a,b)=>a-b).join(', ');
      return `<div class="impl-item" onmouseenter="highlightGroup(${i}, true)" onmouseleave="highlightGroup(${i}, false)">
        <div class="impl-dot" style="background:${col}"></div>
        <span class="impl-term">${termStr}</span>
        <span class="impl-minterms">m(${ms})</span>
      </div>`;
    }).join('');
  }

  const ones = [...(result.ones||[])].sort((a,b)=>a-b);
  const dcs = [...(result.dontCares||[])].sort((a,b)=>a-b);
  let mtStr = '';
  if(ones.length) mtStr += `Σm(${ones.join(', ')})`;
  if(dcs.length) mtStr += `${ones.length?' + ':''}d(${dcs.join(', ')})`;
  mintBox.textContent = mtStr || '—';

  window._lastResult = result;
}

function highlightGroup(index, highlight) {
  document.querySelectorAll('.group-rect').forEach(el => {
    if(el.classList.contains(`term-${index}`)) {
      el.style.fillOpacity = highlight ? '0.4' : '1';
      el.style.strokeWidth = highlight ? '4' : '2';
    } else {
      el.style.opacity = highlight ? '0.2' : '1';
    }
  });
}

// Window resize must redraw SVG
window.addEventListener('resize', () => { if(window._lastResult) drawGroups(window._lastResult); });

// ============================================================
// VERILOG EXPORT
// ============================================================
document.getElementById('verilogBtn').addEventListener('click', () => {
  if(!window._lastResult || !window._lastResult.terms || !window._lastResult.terms.length) {
    showToast('No expression to export');
    return;
  }
  const cfg = CONFIGS[varCount];
  const vars = cfg.vars;
  const terms = window._lastResult.terms;
  let rhs;
  if(window._lastResult.sop === '1') rhs = "1'b1";
  else rhs = terms.map(t => {
    if(t.parts.length === 0) return "1'b1";
    return '(' + t.parts.map(p => p.comp ? `~${p.v}` : p.v).join(' & ') + ')';
  }).join(' | ');

  const verilog = `// Auto-generated by SQGATE K-Map Solver\nassign F = ${rhs};`;
  navigator.clipboard.writeText(verilog).then(() => showToast('Copied!')).catch(() => showToast(verilog));
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ============================================================
// VARIABLE CONTROLS
// ============================================================
document.querySelectorAll('.var-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    varCount = parseInt(btn.dataset.v);
    document.querySelectorAll('.var-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    initGrid();
    renderTable();
    solve();
  });
});


// ============================================================
// INTERACTIVE TOUR
// ============================================================
const KM_TOUR_STEPS = [
  { sel: '#btn-guide', title: 'Interactive K-Map', text: 'Welcome! This tool helps you automatically simplify Boolean algebra using Karnaugh Maps.', action: null },
  { sel: '#kmap-wrapper', title: 'The Grid', text: 'Click any cell on the grid to change its value. Click the top-left cell to set it to 1.', action: 'click-cell' },
  { sel: '#sopDisplay', title: 'Instant Simplification', text: 'The engine instantly groups adjacent 1s and calculates the most simplified Sum-of-Products (SOP) expression.', action: null },
  { sel: '#implList', title: 'Visual Implicants', text: 'Hover over the Prime Implicants listed here to see exactly which cells they bound on the grid!', action: null },
  { sel: '#verilogBtn', title: 'Export', text: 'Once you are done, click this button to copy the simplified logic directly as Verilog code. That\'s it!', action: null }
];
let tourIndex = -1;

function startTour() {
  const guideBtn = document.getElementById('btn-guide');
  if (guideBtn) guideBtn.classList.remove('guide-pulse');
  
  // Reset grid for tutorial
  document.getElementById('v3-btn').click();
  
  document.getElementById('tour-overlay').style.display = 'block';
  setTimeout(() => {
    document.getElementById('tour-dialog').style.opacity = '1';
    document.getElementById('tour-dialog').style.transform = 'translateY(0)';
  }, 10);
  tourIndex = -1;
  nextTourStep();
}

function nextTourStep() {
  tourIndex++;
  if (tourIndex >= KM_TOUR_STEPS.length) {
    endTour();
    return;
  }
  const step = KM_TOUR_STEPS[tourIndex];
  const el = document.querySelector(step.sel);
  if (!el) { nextTourStep(); return; }

  document.getElementById('tour-title-text').textContent = step.title;
  document.getElementById('tour-text').textContent = step.text;
  document.getElementById('tour-progress').textContent = (tourIndex + 1) + '/' + KM_TOUR_STEPS.length;
  
  const nextBtn = document.getElementById('tour-next-btn');
  if (step.action) {
    nextBtn.style.display = 'none';
    document.getElementById('tour-text').innerHTML = step.text + '<br><br><span style="color:#ef4444;font-weight:bold;font-size:11px;text-transform:uppercase;letter-spacing:1px;">Waiting for your action...</span>';
  } else {
    nextBtn.style.display = 'block';
    nextBtn.textContent = (tourIndex === KM_TOUR_STEPS.length - 1) ? 'Finish' : 'Next';
  }

  const hl = document.getElementById('tour-hl');
  const rect = el.getBoundingClientRect();
  hl.style.top = (rect.top - 6) + 'px';
  hl.style.left = (rect.left - 6) + 'px';
  hl.style.width = (rect.width + 12) + 'px';
  hl.style.height = (rect.height + 12) + 'px';

  const dlg = document.getElementById('tour-dialog');
  let topPos = rect.bottom + 16;
  if (topPos + 200 > window.innerHeight) topPos = rect.top - 216;
  let leftPos = rect.left + rect.width / 2 - 160;
  if (leftPos < 10) leftPos = 10;
  if (leftPos + 320 > window.innerWidth) leftPos = window.innerWidth - 330;
  
  dlg.style.top = topPos + 'px';
  dlg.style.left = leftPos + 'px';
}

function endTour() {
  const dlg = document.getElementById('tour-dialog');
  dlg.style.opacity = '0';
  dlg.style.transform = 'translateY(10px)';
  setTimeout(() => {
    document.getElementById('tour-overlay').style.display = 'none';
  }, 300);
}

function checkTourAction(actionName) {
  if (tourIndex >= 0 && tourIndex < KM_TOUR_STEPS.length) {
    if (KM_TOUR_STEPS[tourIndex].action === actionName) {
      setTimeout(nextTourStep, 500);
    }
  }
}

// ============================================================
// INIT
// ============================================================
initGrid();
renderTable();
solve();
</script>
