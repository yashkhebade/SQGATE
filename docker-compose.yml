version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: schemio
      POSTGRES_PASSWORD: schemiopassword
      POSTGRES_DB: schemio_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DB_URL=postgres://schemio:schemiopassword@db:5432/schemio_db?sslmode=disable
      - REDIS_URL=redis:6379
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    restart: always

volumes:
  postgres_data:
